<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Church Clock App - Firebase Driven</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
html, body { margin: 0; padding: 0; height: 100%; background-color: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
body { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; box-sizing: border-box; padding-bottom: 200px; text-align: center; }
h1 { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); font-size: 1.5rem; opacity: 0.7; margin: 0; user-select: none; }

/* Larger timer for visibility */
#timer { font-size: 12rem; font-weight: 900; margin: 0; user-select: none; line-height: 1; }

#progress-bar-container { width: 80%; height: 40px; background: #333; border-radius: 10px; overflow: hidden; margin: 1rem auto 0.5rem auto; position: relative; }
#progress-bar { height: 100%; width: 100%; background-color: #22c55e; transition: width 1s linear, background-color 0.5s linear; }

#overrun, #delay-time, #remaining-time, #predicted-end { font-size: 1.2rem; opacity: 0.6; margin: 0.25rem 0; user-select: none; }

#overrun { color: #ef4444; font-size: 2rem; min-height: 2.5rem; opacity: 1; }

#section-title { font-size: 2.5rem; opacity: 0.8; margin: 0.25rem 0; user-select: none; }

.bottom-container { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px; background: #111; border-top: 2px solid #22c55e; padding: 1rem 1rem 2rem 1rem; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; gap: 1rem; z-index: 10; }

.controls { display: flex; justify-content: center; flex-wrap: wrap; gap: 0.5rem; width: 100%; }
button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; min-width: 80px; user-select: none; }
.menu-toggle { background: #444; color: #fff; border: none; padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; width: 100%; max-width: 600px; text-align: center; user-select: none; }

#menu-section { display: none; width: 100%; max-width: 600px; background: #222; padding: 1rem; border-radius: 8px; box-sizing: border-box; user-select: none; max-height: 200px; overflow-y: auto; }

#section-list { max-height: 120px; overflow-y: auto; }
.section-item { display: flex; justify-content: space-between; align-items: center; background: #111; margin-bottom: 0.5rem; padding: 0.5rem; border-radius: 5px; cursor: move; }
.section-item.active { border: 2px solid #22c55e; }
.remove-btn { background: #ef4444; color: white; border: none; padding: 0.3rem 0.6rem; cursor: pointer; }
</style>
</head>
<body>

<h1>Church Clock App</h1>

<div id="timer">--:--</div>
<div id="progress-bar-container"><div id="progress-bar"></div></div>

<!-- Improved Overrun -->
<div id="overrun"></div>

<div id="delay-time">Total Delay: 0:00</div>

<h2 id="section-title">Church Schedule Timer</h2>

<div id="remaining-time">Remaining Schedule Time: --:--</div>
<div id="predicted-end">Predicted End: --:--</div>

<div class="bottom-container">
  <div class="controls">
    <button onclick="startTimer()">Start</button>
    <button onclick="pauseTimer()">Pause</button>
    <button onclick="resetTimer()">Reset</button>
    <button onclick="previousSection()">Back</button>
    <button onclick="nextSection()">Next</button>
  </div>

  <button class="menu-toggle" onclick="toggleMenu()">Toggle Schedule Menu</button>

  <div id="menu-section">
    <div class="controls" style="flex-wrap: nowrap; justify-content: flex-start;">
      <input type="text" id="section-name" placeholder="Section name" />
      <input type="number" id="minutes" placeholder="Min" min="0" style="width: 60px; margin-left: 0.5rem" />
      <input type="number" id="seconds" placeholder="Sec" min="0" max="59" style="width: 60px; margin-left: 0.5rem" />
      <button onclick="addSection()" style="margin-left: 0.5rem">Add</button>
    </div>
    <div id="section-list" ondragover="event.preventDefault()" ondrop="dropSection(event)"></div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD056thmGLxTwVOU01Qy_KNIqS4aqdW8Bw",
  authDomain: "clockapp-26b10.firebaseapp.com",
  projectId: "clockapp-26b10",
  storageBucket: "clockapp-26b10.firebasestorage.app",
  messagingSenderId: "381529267609",
  appId: "1:381529267609:web:3b6565b1b60c2c72acc708",
  measurementId: "G-SX7DKY8WPQ"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

let sections = [], currentSection = 0, timeLeft = 0, isRunning = false, dragStartIndex = null, totalDelay = 0;

// Formatters
function format(seconds){ 
  const m=Math.floor(Math.abs(seconds)/60); 
  const s=Math.abs(seconds)%60; 
  return `${m}:${s.toString().padStart(2,'0')}`;
}
function formatHMS(seconds){
  const abs=Math.abs(seconds);
  const h=Math.floor(abs/3600);
  const m=Math.floor((abs%3600)/60);
  const s=abs%60;
  return h>0?`${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`:`${m}:${s.toString().padStart(2,'0')}`;
}

// Update display
function updateDisplay(){
  const timerEl=document.getElementById("timer");
  const overrunEl=document.getElementById("overrun");

  if(timeLeft >= 0){
    timerEl.textContent = format(timeLeft);
    timerEl.style.color = "#22c55e";
    overrunEl.textContent = "";
  } else {
    timerEl.textContent = "00:00";
    timerEl.style.color = "#ef4444";

    const name = sections[currentSection]?.name || "Section";
    overrunEl.textContent = `Overrun on “${name}”: ${format(Math.abs(timeLeft))}`;
  }

  document.getElementById("delay-time").textContent = "Total Delay: " + format(totalDelay);

  updateProgressBar();
  updateRemainingTime();
  updatePredictedEnd();
}

function updateProgressBar(){
  const total=sections[currentSection]?.duration || 1;
  const remaining=Math.max(timeLeft,0);
  const percent=(remaining/total)*100;
  const bar=document.getElementById("progress-bar");

  if(percent > 50) bar.style.backgroundColor="#22c55e";
  else if(percent > 20) bar.style.backgroundColor="#f97316";
  else bar.style.backgroundColor="#ef4444";

  bar.style.width = percent + "%";
}

function updateTitle(){
  document.getElementById("section-title").textContent = 
    sections[currentSection]?.name || "Church Schedule Timer";
}

function updateRemainingTime(){
  const el=document.getElementById("remaining-time");
  let remaining=Math.max(timeLeft,0) + totalDelay;

  for(let i=currentSection+1;i<sections.length;i++)
    remaining += sections[i].duration;

  el.textContent = "Remaining Schedule Time: " + formatHMS(remaining);
}

function updatePredictedEnd(){
  const el=document.getElementById("predicted-end");
  let remaining=Math.max(timeLeft,0) + totalDelay;

  for(let i=currentSection+1;i<sections.length;i++)
    remaining += sections[i].duration;

  const end = new Date(Date.now() + remaining*1000);
  el.textContent = "Predicted End: " + end.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
}

// Save to Firebase
function saveState(){
  database.ref('timerState').set({
    secretKey:'PickAllPokemons98',
    sections,
    currentSection,
    timeLeft,
    isRunning,
    totalDelay,
    lastUpdated: Date.now()
  });
}

// Controls
function startTimer(){ if(!sections[currentSection]) return; isRunning=true; saveState(); }
function pauseTimer(){ isRunning=false; saveState(); }
function resetTimer(){ timeLeft=sections[currentSection]?.duration||0; isRunning=false; totalDelay=0; saveState(); }

function nextSection(){
  if(currentSection < sections.length-1){
    currentSection++;
    timeLeft = sections[currentSection].duration;
    totalDelay = 0;
    isRunning = true;
    saveState();
  }
}
function previousSection(){
  if(currentSection > 0){
    currentSection--;
    timeLeft = sections[currentSection].duration;
    totalDelay = 0;
    isRunning = true;
    saveState();
  }
}

// Add/remove sections
function addSection(){
  const name=document.getElementById("section-name").value.trim();
  const m=parseInt(document.getElementById("minutes").value)||0;
  const s=parseInt(document.getElementById("seconds").value)||0;
  const duration=m*60+s;
  if(!name || duration<=0) return;

  sections.push({name,duration});
  document.getElementById("section-name").value="";
  document.getElementById("minutes").value="";
  document.getElementById("seconds").value="";
  saveState();
}

function removeSection(index){
  if(isRunning) return alert("Pause timer before removing sections.");
  sections.splice(index,1);
  if(currentSection >= sections.length) currentSection = sections.length-1;
  timeLeft = sections[currentSection]?.duration || 0;
  saveState();
}

// Drag & Drop
function dragStart(e){ dragStartIndex = +e.target.getAttribute("data-index"); }
function dropSection(e){
  const target=e.target.closest(".section-item");
  if(!target) return;

  const dropIndex = +target.getAttribute("data-index");
  const item = sections.splice(dragStartIndex,1)[0];
  sections.splice(dropIndex,0,item);

  if(currentSection === dragStartIndex) currentSection = dropIndex;
  saveState();
}

function renderSections(){
  const list=document.getElementById("section-list");
  list.innerHTML="";

  sections.forEach((s,i)=>{
    const div=document.createElement("div");
    div.className="section-item" + (i===currentSection?" active":"");
    div.setAttribute("draggable",true);
    div.setAttribute("data-index",i);
    div.ondragstart = dragStart;

    div.innerHTML = `
      <span>${s.name} (${format(s.duration)})</span>
      <button class="remove-btn" onclick="removeSection(${i})">X</button>
    `;
    list.appendChild(div);
  });

  updateTitle();
}

function toggleMenu(){
  const menu=document.getElementById("menu-section");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

// Sync with Firebase
function listenFirebase(){
  database.ref('timerState').on('value',(snap)=>{
    const data=snap.val();
    if(!data || data.secretKey !== 'PickAllPokemons98') return;

    sections = data.sections || [];
    currentSection = data.currentSection ?? 0;

    if(data.lastUpdated){
      const elapsed = Math.floor((Date.now() - data.lastUpdated)/1000);
      timeLeft = (data.timeLeft ?? sections[currentSection]?.duration || 0) - (data.isRunning ? elapsed : 0);

      if(timeLeft < 0 && data.isRunning)
        totalDelay = Math.abs(timeLeft);
      else
        totalDelay = data.totalDelay || 0;

    } else {
      timeLeft = data.timeLeft ?? sections[currentSection]?.duration || 0;
      totalDelay = data.totalDelay || 0;
    }

    isRunning = data.isRunning;

    renderSections();
    updateDisplay();
  });
}

// Timer loop
setInterval(()=>{
  if(isRunning){
    timeLeft--;
    if(timeLeft < 0) totalDelay++;
    saveState();
  }
  updateDisplay();
},1000);

window.onload = ()=>{ listenFirebase(); updateDisplay(); };
</script>

</body>
</html>
