<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Tempo Clock - Controller</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
/* --- BASE STYLING --- */
html, body { margin: 0; padding: 0; height: 100%; background-color: #1a1a1a; color: #fff; font-family: sans-serif; overflow: hidden; }
body { display: flex; flex-direction: column; justify-content: center; align-items: center; box-sizing: border-box; text-align: center; height: 100vh; padding-bottom: 220px; }

h1 { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); font-size: clamp(1rem, 2vw, 1.5rem); opacity: 0.5; margin: 0; user-select: none; width: 100%; z-index: 1; }

#timer, #remaining-time { transition: opacity 0.4s ease; opacity: 0; }
#timer { font-size: clamp(5rem, 25vw, 15rem); font-weight: 900; margin: 0; user-select: none; line-height: 1; transition: color 0.3s ease, opacity 0.4s ease; }
#section-title { font-size: clamp(1.5rem, 6vw, 3rem); opacity: 0.9; margin: 0.5rem 0; user-select: none; }
#overrun, #remaining-time { font-size: clamp(1.1rem, 4vw, 2.5rem); opacity: 0.9; margin: 0.25rem 0; user-select: none; }
#overrun { color: #ef4444; min-height: 2.5rem; }

#progress-bar-container { width: 90%; max-width: 800px; height: clamp(15px, 4vw, 40px); background: #333; border-radius: 10px; overflow: hidden; margin: 0.5rem auto; position: relative; }
#progress-bar { height: 100%; width: 100%; background-color: #22c55e; transition: width 0.1s linear; }

/* CONTROLS */
.bottom-container { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px; background: #1a1a1a; border-top: 2px solid #22c55e; padding: 15px 15px env(safe-area-inset-bottom, 20px) 15px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 10; border-radius: 15px 15px 0 0; }
.controls { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; width: 100%; }
button { padding: 12px 18px; font-size: 1rem; cursor: pointer; min-width: 75px; border-radius: 8px; border: none; font-weight: bold; background: #333; color: white; }
.menu-toggle { background: #22c55e; color: #000; width: 100%; padding: 12px; border-radius: 8px; }

/* MENU & LIST */
#menu-section { display: none; width: 100%; background: #222; padding: 10px; border-radius: 8px; max-height: 35vh; overflow-y: auto; }
input { padding: 10px; border-radius: 6px; border: 1px solid #444; background: #111; color: white; font-size: 1rem; }
#section-list { margin-top: 10px; }
.section-item { display: flex; justify-content: space-between; align-items: center; background: #111; margin-bottom: 5px; padding: 10px; border-radius: 5px; cursor: pointer; border: 2px solid transparent; }
.section-item.active { border-color: #22c55e; }
.remove-btn { background: #ef4444; padding: 6px 12px; min-width: auto; margin-left: 10px; }

@media (orientation: landscape) and (max-height: 500px) {
  body { padding-bottom: 0; justify-content: flex-start; padding-top: 25px; }
  #timer { font-size: 35vh; margin-top: -10px; }  
  #progress-bar-container { display: none; }  
  .bottom-container { padding: 5px; gap: 5px; border-radius: 0; max-width: 100%; }
}
</style>
</head>
<body>

<h1>Tempo Clock</h1>

<div id="timer">00:00</div>
<div id="progress-bar-container"><div id="progress-bar"></div></div>
<div id="overrun"></div>
<h2 id="section-title">---</h2>
<div id="remaining-time">Remaining Schedule Time: 00:00</div>

<div class="bottom-container">
  <div class="controls">
    <button onclick="handleAction(startTimer)">Start</button>
    <button onclick="handleAction(pauseTimer)">Pause</button>
    <button onclick="handleAction(resetTimer)">Reset</button>
    <button onclick="handleAction(previousSection)">Back</button>
    <button onclick="handleAction(nextSection)">Next</button>
  </div>
  <button class="menu-toggle" onclick="toggleMenu()">Toggle Schedule Menu</button>
  <div id="menu-section">
    <div class="controls" style="flex-wrap: nowrap;">
      <input type="text" id="section-name" placeholder="Name" style="flex-grow:1" />
      <input type="number" id="minutes" placeholder="Min" style="width:50px" />
      <input type="number" id="seconds" placeholder="Sec" style="width:50px" />
      <button onclick="addSection()">Add</button>
    </div>
    <div id="section-list"></div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD056thmGLxTwVOU01Qy_KNIqS4aqdW8Bw",
  authDomain: "clockapp-26b10.firebaseapp.com",
  projectId: "clockapp-26b10",
  storageBucket: "clockapp-26b10.firebasestorage.app",
  messagingSenderId: "381529267609",
  appId: "1:381529267609:web:3b6565b1b60c2c72acc708",
  measurementId: "G-SX7DKY8WPQ"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

let sections=[], currentSection=0, timeLeft=0, isRunning=false, overrunTime=0;
let lastUpdate = Date.now();
let lastPushTime = 0;

function format(seconds){ const m=Math.floor(Math.abs(seconds)/60); const s=Math.abs(seconds)%60; return `${m}:${s.toString().padStart(2,'0')}`; }
function formatHMS(seconds){ const absSec=Math.abs(seconds); const h=Math.floor(absSec/3600); const m=Math.floor((absSec%3600)/60); const s=absSec%60; return h>0?`${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`:`${m}:${s.toString().padStart(2,'0')}`; }

function updateDisplay(){
  const timerEl=document.getElementById("timer");
  const remainingEl=document.getElementById("remaining-time");
  const overrunEl=document.getElementById("overrun");
  const displayTime = Math.floor(timeLeft);
  
  timerEl.style.opacity = "1";
  remainingEl.style.opacity = "1";

  if(displayTime>=0){
    timerEl.textContent=format(displayTime);
    timerEl.style.color="#22c55e";
    overrunEl.textContent=overrunTime>0?`Overrun: ${format(overrunTime)}`:'';
  } else {
    timerEl.textContent="00:00";
    timerEl.style.color="#ef4444";
    overrunEl.textContent=`Overrun: ${format(Math.floor(Math.abs(timeLeft)))}`;
  }
  updateProgressBar();
  updateRemainingTime();
  updateTitle();
}

function updateProgressBar(){
  const total=sections[currentSection]?.duration||1;
  const percent=(Math.max(timeLeft,0)/total)*100;
  const pb=document.getElementById("progress-bar");
  pb.style.width=percent+"%";
  pb.style.backgroundColor = percent > 50 ? "#22c55e" : (percent > 20 ? "#f97316" : "#ef4444");
}

function updateTitle(){ document.getElementById("section-title").textContent = sections[currentSection]?.name || "Church Schedule Timer"; }

function updateRemainingTime(){
  let rem=Math.max(timeLeft,0)+overrunTime;
  for(let i=currentSection+1;i<sections.length;i++) rem+=sections[i].duration;
  document.getElementById("remaining-time").textContent="Remaining Schedule Time: "+formatHMS(Math.floor(rem));
}

function saveState(){
  lastPushTime = Date.now();
  database.ref('timerState').set({
    secretKey:'PickAllPokemons98', sections, currentSection, timeLeft, isRunning, overrunTime, lastUpdated: Date.now()
  });
}

function handleAction(fn) { fn(); updateDisplay(); saveState(); }

function startTimer(){ if(sections[currentSection]) isRunning=true; }
function pauseTimer(){ isRunning=false; }
function resetTimer(){ timeLeft=sections[currentSection]?.duration||0; overrunTime=0; isRunning=false; }
function nextSection(){ if(currentSection<sections.length-1){ currentSection++; timeLeft=sections[currentSection].duration; overrunTime=0; isRunning=true; }}
function previousSection(){ if(currentSection>0){ currentSection--; timeLeft=sections[currentSection].duration; overrunTime=0; isRunning=true; }}

function addSection(){
  const name=document.getElementById("section-name").value.trim();
  const dur=(parseInt(document.getElementById("minutes").value)||0)*60+(parseInt(document.getElementById("seconds").value)||0);
  if(name && dur>0){ sections.push({name, duration: dur}); saveState(); }
}

function removeSection(index, e){
  e.stopPropagation(); // Prevents clicking the row when hitting X
  if(isRunning) return alert("Pause timer before removing.");
  sections.splice(index, 1);
  if(currentSection >= sections.length) currentSection = sections.length - 1;
  if(sections.length > 0) timeLeft = sections[currentSection].duration;
  saveState();
}

function jumpToSection(index){
  currentSection = index;
  timeLeft = sections[currentSection].duration;
  overrunTime = 0;
  isRunning = true;
  saveState();
  renderSections();
}

function listenFirebase(){
  database.ref('timerState').on('value',(snapshot)=>{
    if(Date.now() - lastPushTime < 1500) return; 
    const data=snapshot.val();
    if(!data || data.secretKey!=='PickAllPokemons98') return;
    sections=data.sections||[]; 
    currentSection=data.currentSection??0;
    const elapsed=data.lastUpdated ? (Date.now() - data.lastUpdated)/1000 : 0;
    timeLeft=(data.timeLeft??0) - (data.isRunning?elapsed:0);
    overrunTime=data.overrunTime||0;
    isRunning=data.isRunning||false;
    renderSections(); 
    updateDisplay();
  });
}

function renderSections(){
  const list=document.getElementById("section-list");
  list.innerHTML = sections.map((s, i) => `
    <div class="section-item ${i===currentSection?'active':''}" onclick="jumpToSection(${i})">
      <span>${s.name} (${format(s.duration)})</span>
      <button class="remove-btn" onclick="removeSection(${i}, event)">X</button>
    </div>`).join('');
}

function smoothUpdate(){
  const now = Date.now();
  const delta = (now - lastUpdate)/1000;
  lastUpdate = now;
  if(isRunning){
    timeLeft -= delta;
    if(timeLeft < 0) overrunTime = Math.abs(timeLeft);
    updateDisplay();
    if(Math.floor(now/1000) !== Math.floor((now-delta*1000)/1000)) saveState();
  }
  requestAnimationFrame(smoothUpdate);
}

function toggleMenu(){ const m=document.getElementById("menu-section"); m.style.display=m.style.display==="block"?"none":"block"; }

window.onload=()=>{ listenFirebase(); lastUpdate=Date.now(); smoothUpdate(); };
</script>
</body>
</html>
