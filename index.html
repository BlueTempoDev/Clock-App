<script>
const firebaseConfig = {
  apiKey: "AIzaSyD056thmGLxTwVOU01Qy_KNIqS4aqdW8Bw",
  authDomain: "clockapp-26b10.firebaseapp.com",
  projectId: "clockapp-26b10",
  storageBucket: "clockapp-26b10.firebasestorage.app",
  messagingSenderId: "381529267609",
  appId: "1:381529267609:web:3b6565b1b60c2c72acc708",
  measurementId: "G-SX7DKY8WPQ"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

let sections = [], currentSection = 0, timeLeft = 0, isRunning = false, dragStartIndex = null, totalDelay = 0;

// Formatters
function format(seconds){ 
  const m=Math.floor(Math.abs(seconds)/60); 
  const s=Math.abs(seconds)%60; 
  return `${m}:${s.toString().padStart(2,'0')}`;
}
function formatHMS(seconds){
  const abs=Math.abs(seconds);
  const h=Math.floor(abs/3600);
  const m=Math.floor((abs%3600)/60);
  const s=abs%60;
  return h>0?`${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`:`${m}:${s.toString().padStart(2,'0')}`;
}

function updateDisplay(){
  const timerEl=document.getElementById("timer");
  const overrunEl=document.getElementById("overrun");

  if(timeLeft >= 0){
    timerEl.textContent = format(timeLeft);
    timerEl.style.color = "#22c55e";
    overrunEl.textContent = "";
  } else {
    timerEl.textContent = "00:00";
    timerEl.style.color = "#ef4444";

    const name = sections[currentSection]?.name || "Section";
    overrunEl.textContent = `Overrun on “${name}”: ${format(Math.abs(timeLeft))}`;
  }

  document.getElementById("delay-time").textContent = "Total Delay: " + format(totalDelay);
  updateProgressBar();
  updateRemainingTime();
  updatePredictedEnd();
}

function updateProgressBar(){
  const total=sections[currentSection]?.duration || 1;
  const remaining=Math.max(timeLeft,0);
  const percent=(remaining/total)*100;
  const bar=document.getElementById("progress-bar");

  if(percent > 50) bar.style.backgroundColor="#22c55e";
  else if(percent > 20) bar.style.backgroundColor="#f97316";
  else bar.style.backgroundColor="#ef4444";

  bar.style.width = percent + "%";
}

function updateTitle(){
  document.getElementById("section-title").textContent = 
    sections[currentSection]?.name || "Church Schedule Timer";
}

function updateRemainingTime(){
  const el=document.getElementById("remaining-time");
  let remaining=Math.max(timeLeft,0) + totalDelay;

  for(let i=currentSection+1;i<sections.length;i++)
    remaining += sections[i].duration;

  el.textContent = "Remaining Schedule Time: " + formatHMS(remaining);
}

function updatePredictedEnd(){
  const el=document.getElementById("predicted-end");
  let remaining=Math.max(timeLeft,0) + totalDelay;

  for(let i=currentSection+1;i<sections.length;i++)
    remaining += sections[i].duration;

  const end = new Date(Date.now() + remaining*1000);
  el.textContent = "Predicted End: " + end.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
}

// Save to Firebase
function saveState(){
  database.ref('timerState').set({
    secretKey:'PickAllPokemons98',
    sections,
    currentSection,
    timeLeft,
    isRunning,
    totalDelay,
    lastUpdated: Date.now()
  });
}

// Controls
function startTimer(){ if(!sections[currentSection]) return; isRunning=true; saveState(); }
function pauseTimer(){ isRunning=false; saveState(); }
function resetTimer(){ timeLeft=sections[currentSection]?.duration||0; isRunning=false; totalDelay=0; saveState(); }

function nextSection(){
  if(currentSection < sections.length-1){
    currentSection++;
    timeLeft = sections[currentSection].duration;
    totalDelay = 0;
    isRunning = true;
    saveState();
  }
}
function previousSection(){
  if(currentSection > 0){
    currentSection--;
    timeLeft = sections[currentSection].duration;
    totalDelay = 0;
    isRunning = true;
    saveState();
  }
}

// Add/remove sections
function addSection(){
  const name=document.getElementById("section-name").value.trim();
  const m=parseInt(document.getElementById("minutes").value)||0;
  const s=parseInt(document.getElementById("seconds").value)||0;
  const duration=m*60+s;
  if(!name || duration<=0) return;

  sections.push({name,duration});
  document.getElementById("section-name").value="";
  document.getElementById("minutes").value="";
  document.getElementById("seconds").value="";
  saveState();
}

function removeSection(index){
  if(isRunning) return alert("Pause timer before removing sections.");
  sections.splice(index,1);
  if(currentSection >= sections.length) currentSection = sections.length-1;
  timeLeft = sections[currentSection]?.duration || 0;
  saveState();
}

// Drag & Drop
function dragStart(e){ dragStartIndex = +e.target.getAttribute("data-index"); }
function dropSection(e){
  const target=e.target.closest(".section-item");
  if(!target) return;

  const dropIndex = +target.getAttribute("data-index");
  const item = sections.splice(dragStartIndex,1)[0];
  sections.splice(dropIndex,0,item);

  if(currentSection === dragStartIndex) currentSection = dropIndex;
  saveState();
}

function renderSections(){
  const list=document.getElementById("section-list");
  list.innerHTML="";

  sections.forEach((s,i)=>{
    const div=document.createElement("div");
    div.className="section-item" + (i===currentSection?" active":"");
    div.setAttribute("draggable",true);
    div.setAttribute("data-index",i);
    div.ondragstart = dragStart;

    div.innerHTML = `
      <span>${s.name} (${format(s.duration)})</span>
      <button class="remove-btn" onclick="removeSection(${i})">X</button>
    `;
    list.appendChild(div);
  });

  updateTitle();
}

function toggleMenu(){
  const menu=document.getElementById("menu-section");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function listenFirebase(){
  database.ref('timerState').on('value',(snap)=>{
    const data=snap.val();
    if(!data || data.secretKey !== 'PickAllPokemons98') return;

    sections = data.sections || [];
    currentSection = data.currentSection ?? 0;

    if(data.lastUpdated){
      const elapsed = Math.floor((Date.now() - data.lastUpdated)/1000);
      timeLeft = (data.timeLeft ?? sections[currentSection]?.duration || 0) - (data.isRunning ? elapsed : 0);

      if(timeLeft < 0 && data.isRunning)
        totalDelay = Math.abs(timeLeft);
      else
        totalDelay = data.totalDelay || 0;

    } else {
      timeLeft = data.timeLeft ?? sections[currentSection]?.duration || 0;
      totalDelay = data.totalDelay || 0;
    }

    isRunning = data.isRunning;
    renderSections();
    updateDisplay();
  });
}

setInterval(()=>{
  if(isRunning){
    timeLeft--;
    if(timeLeft < 0) totalDelay++;
    saveState();
  }
  updateDisplay();
},1000);

window.onload = ()=>{ listenFirebase(); updateDisplay(); };
</script>
