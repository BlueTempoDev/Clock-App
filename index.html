<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Tempo Clock - Controller</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
/* --- BASE STYLING --- */
html, body { margin: 0; padding: 0; height: 100%; background-color: #1a1a1a; color: #fff; font-family: sans-serif; overflow: hidden; }
body { display: flex; flex-direction: column; justify-content: center; align-items: center; box-sizing: border-box; text-align: center; height: 100vh; padding-bottom: 220px; }

h1 { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); font-size: clamp(1rem, 2vw, 1.5rem); opacity: 0.5; margin: 0; z-index: 1; }

#timer, #remaining-time { transition: opacity 0.4s ease; opacity: 0; }
#timer { font-size: clamp(5rem, 25vw, 15rem); font-weight: 900; margin: 0; line-height: 1; transition: color 0.3s ease, opacity 0.4s ease; }
#section-title { font-size: clamp(1.5rem, 6vw, 3rem); opacity: 0.9; margin: 0.5rem 0; }
#overrun, #remaining-time { font-size: clamp(1.1rem, 4vw, 2.5rem); opacity: 0.9; margin: 0.25rem 0; }
#overrun { color: #ef4444; min-height: 2.5rem; }

#progress-bar-container { width: 90%; max-width: 800px; height: 30px; background: #333; border-radius: 10px; overflow: hidden; margin: 0.5rem auto; position: relative; }
#progress-bar { height: 100%; width: 100%; background-color: #22c55e; transition: width 0.1s linear; }

.bottom-container { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px; background: #1a1a1a; border-top: 2px solid #22c55e; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 10; border-radius: 15px 15px 0 0; }
.controls { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; width: 100%; }
button { padding: 12px; font-size: 1rem; cursor: pointer; min-width: 70px; border-radius: 8px; border: none; font-weight: bold; background: #333; color: white; }
.menu-toggle { background: #22c55e; color: #000; width: 100%; }

#menu-section { display: none; width: 100%; background: #222; padding: 10px; border-radius: 8px; max-height: 35vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
input { padding: 8px; border-radius: 6px; border: 1px solid #444; background: #111; color: white; width: 50px; }

.section-item { display: flex; justify-content: space-between; align-items: center; background: #111; margin-bottom: 5px; padding: 12px; border-radius: 5px; border: 2px solid transparent; touch-action: auto; }
.section-item.active { border-color: #22c55e; }
.remove-btn { background: #ef4444; min-width: 35px; padding: 8px; font-size: 14px; }

/* Sortable Ghost styling */
.sortable-ghost { opacity: 0.4; background-color: #22c55e !important; }

@media (orientation: landscape) and (max-height: 500px) {
  body { padding-bottom: 0; justify-content: flex-start; padding-top: 20px; }
  #timer { font-size: 35vh; }  
  #progress-bar-container { display: none; }
  .bottom-container { padding: 5px; border-radius: 0; max-width: 100%; }
}
</style>
</head>
<body>

<h1>Tempo Clock</h1>
<div id="timer">00:00</div>
<div id="progress-bar-container"><div id="progress-bar"></div></div>
<div id="overrun"></div>
<h2 id="section-title">---</h2>
<div id="remaining-time">Remaining: 00:00</div>

<div class="bottom-container">
  <div class="controls">
    <button onclick="handleAction(startTimer)">Start</button>
    <button onclick="handleAction(pauseTimer)">Pause</button>
    <button onclick="handleAction(resetTimer)">Reset</button>
    <button onclick="handleAction(previousSection)">Back</button>
    <button onclick="handleAction(nextSection)">Next</button>
  </div>
  <button class="menu-toggle" onclick="toggleMenu()">Edit Schedule</button>
  <div id="menu-section">
    <div class="controls" style="flex-wrap: nowrap;">
      <input type="text" id="section-name" placeholder="Name" style="flex-grow:1" />
      <input type="number" id="minutes" placeholder="M" />
      <input type="number" id="seconds" placeholder="S" />
      <button onclick="addSection()">Add</button>
    </div>
    <div id="section-list"></div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD056thmGLxTwVOU01Qy_KNIqS4aqdW8Bw",
  authDomain: "clockapp-26b10.firebaseapp.com",
  projectId: "clockapp-26b10",
  storageBucket: "clockapp-26b10.firebasestorage.app",
  messagingSenderId: "381529267609",
  appId: "1:381529267609:web:3b6565b1b60c2c72acc708"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

let sections=[], currentSection=0, timeLeft=0, isRunning=false, overrunTime=0;
let lastUpdate = Date.now(), lastPushTime = 0;

function format(s){ 
  const abs = Math.floor(Math.abs(s));
  return `${Math.floor(abs/60)}:${(abs%60).toString().padStart(2,'0')}`; 
}

function updateDisplay(){
  const timerEl=document.getElementById("timer"), remEl=document.getElementById("remaining-time");
  timerEl.style.opacity = "1"; remEl.style.opacity = "1";
  
  if(timeLeft >= 0){
    timerEl.textContent = format(timeLeft);
    timerEl.style.color = "#22c55e";
    document.getElementById("overrun").textContent = overrunTime > 0 ? `Overrun: ${format(overrunTime)}` : '';
  } else {
    timerEl.textContent = "00:00";
    timerEl.style.color = "#ef4444";
    document.getElementById("overrun").textContent = `Overrun: ${format(timeLeft)}`;
  }
  
  const total = sections[currentSection]?.duration || 1;
  document.getElementById("progress-bar").style.width = (Math.max(timeLeft,0)/total*100) + "%";
  document.getElementById("section-title").textContent = sections[currentSection]?.name || "Schedule Empty";
  
  let remTotal = Math.max(timeLeft, 0) + overrunTime;
  for(let i=currentSection+1; i<sections.length; i++) remTotal += sections[i].duration;
  remEl.textContent = "Remaining Schedule: " + format(remTotal);
}

function saveState(){
  lastPushTime = Date.now();
  database.ref('timerState').set({
    secretKey:'PickAllPokemons98', sections, currentSection, timeLeft, isRunning, overrunTime, lastUpdated: Date.now()
  });
}

function handleAction(fn) { fn(); updateDisplay(); saveState(); }
function startTimer(){ if(sections.length) isRunning=true; }
function pauseTimer(){ isRunning=false; }
function resetTimer(){ timeLeft=sections[currentSection]?.duration||0; overrunTime=0; isRunning=false; }
function nextSection(){ if(currentSection<sections.length-1){ currentSection++; timeLeft=sections[currentSection].duration; overrunTime=0; isRunning=true; }}
function previousSection(){ if(currentSection>0){ currentSection--; timeLeft=sections[currentSection].duration; overrunTime=0; isRunning=true; }}

function addSection(){
  const n = document.getElementById("section-name"), m = document.getElementById("minutes"), s = document.getElementById("seconds");
  const dur = (parseInt(m.value)||0)*60 + (parseInt(s.value)||0);
  if(n.value && dur > 0){
    sections.push({name: n.value, duration: dur});
    if(sections.length === 1) timeLeft = dur;
    n.value = ""; m.value = ""; s.value = "";
    renderSections(); saveState();
  }
}

function removeSection(idx, e){
  e.stopPropagation();
  sections.splice(idx, 1);
  if(currentSection >= sections.length) currentSection = Math.max(0, sections.length - 1);
  if(sections.length) timeLeft = sections[currentSection].duration;
  renderSections(); saveState();
}

function jumpTo(idx){
  currentSection = idx; timeLeft = sections[idx].duration; overrunTime = 0; isRunning = true;
  saveState(); renderSections();
}

function renderSections(){
  const list = document.getElementById("section-list");
  list.innerHTML = sections.map((s, i) => `
    <div class="section-item ${i===currentSection?'active':''}" data-id="${i}" onclick="jumpTo(${i})">
      <span>${s.name} (${format(s.duration)})</span>
      <button class="remove-btn" onclick="removeSection(${i}, event)">X</button>
    </div>`).join('');
    
  new Sortable(list, {
    animation: 150,
    delay: 500, // <--- TAP AND HOLD FOR 0.5 SECONDS TO DRAG
    delayOnTouchOnly: true, // Only use delay on mobile devices
    touchStartThreshold: 5, // Prevents accidental drags while scrolling
    onEnd: (evt) => {
      const item = sections.splice(evt.oldIndex, 1)[0];
      sections.splice(evt.newIndex, 0, item);
      saveState();
    }
  });
}

function listenFirebase(){
  database.ref('timerState').on('value', snap => {
    if(Date.now() - lastPushTime < 1500) return;
    const d = snap.val();
    if(!d || d.secretKey !== 'PickAllPokemons98') return;
    sections = d.sections || []; currentSection = d.currentSection || 0;
    isRunning = d.isRunning; overrunTime = d.overrunTime || 0;
    const elapsed = d.lastUpdated ? (Date.now() - d.lastUpdated)/1000 : 0;
    timeLeft = (d.timeLeft || 0) - (isRunning ? elapsed : 0);
    renderSections(); updateDisplay();
  });
}

setInterval(() => {
  if(isRunning){
    timeLeft -= 1;
    if(timeLeft < 0) overrunTime = Math.abs(timeLeft);
    updateDisplay();
    if(Math.floor(Date.now()/1000) % 2 === 0) saveState();
  }
}, 1000);

function toggleMenu(){ const m=document.getElementById("menu-section"); m.style.display=m.style.display==="block"?"none":"block"; }
window.onload=()=>{ listenFirebase(); };
</script>
</body>
</html>
