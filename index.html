<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Church Clock App - Firebase Driven</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
/* --- RESPONSIVE CSS UPDATES --- */
html, body { margin: 0; padding: 0; height: 100%; background-color: #121212; color: #fff; font-family: sans-serif; overflow-x: hidden; }
body { display: flex; flex-direction: column; justify-content: center; align-items: center; box-sizing: border-box; padding-bottom: 220px; text-align: center; }

h1 { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); font-size: clamp(1.2rem, 3vw, 2rem); opacity: 0.7; margin: 0; user-select: none; width: 100%; }

/* clamp(MIN, IDEAL, MAX) makes text auto-size for phones vs laptops */
#timer { font-size: clamp(5rem, 25vw, 15rem); font-weight: 900; margin: 0; user-select: none; line-height: 1; }
#section-title { font-size: clamp(1.5rem, 6vw, 3rem); opacity: 0.9; margin: 0.5rem 0; user-select: none; }
#overrun, #remaining-time { font-size: clamp(1.2rem, 4vw, 2.5rem); opacity: 0.9; margin: 0.25rem 0; user-select: none; }
#overrun { color: #ef4444; min-height: clamp(1.5rem, 5vw, 3rem); }

#progress-bar-container { width: 90%; max-width: 800px; height: clamp(20px, 4vw, 50px); background: #333; border-radius: 10px; overflow: hidden; margin: 1rem auto 0.5rem auto; position: relative; }
#progress-bar { height: 100%; width: 100%; background-color: #22c55e; transition: width 1s linear, background-color 0.5s linear; }

/* Mobile Friendly Bottom Menu */
.bottom-container { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px; background: #1a1a1a; border-top: 2px solid #22c55e; padding: 1rem 1rem env(safe-area-inset-bottom, 2rem) 1rem; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; gap: 0.8rem; z-index: 10; border-radius: 15px 15px 0 0; }
.controls { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; width: 100%; }

/* Bigger touch targets for fingers */
button { padding: 12px 18px; font-size: 1.1rem; cursor: pointer; min-width: 80px; user-select: none; border-radius: 8px; border: none; font-weight: bold; background: #333; color: white; transition: background 0.2s; }
button:active { background: #555; }

.menu-toggle { background: #22c55e; color: #000; padding: 12px 18px; font-size: 1.1rem; cursor: pointer; width: 100%; text-align: center; user-select: none; border-radius: 8px; }
#menu-section { display: none; width: 100%; background: #222; padding: 1rem; border-radius: 8px; box-sizing: border-box; user-select: none; max-height: 40vh; overflow-y: auto; }
#menu-section .controls { justify-content: space-between; gap: 5px; flex-wrap: nowrap; margin-bottom: 1rem; }

input { padding: 10px; border-radius: 6px; border: 1px solid #444; background: #111; color: white; font-size: 1rem; }
#section-name { flex-grow: 1; min-width: 80px; }
#minutes, #seconds { width: 60px; }

#section-list { max-height: 25vh; overflow-y: auto; }
.section-item { display: flex; justify-content: space-between; align-items: center; background: #111; margin-bottom: 0.5rem; padding: 10px; border-radius: 5px; cursor: move; font-size: 1.1rem; }
.section-item.active { border: 2px solid #22c55e; }
.remove-btn { background: #ef4444; padding: 8px 12px; }
</style>
</head>
<body>

<h1>Church Clock App</h1>

<div id="timer">--:--</div>
<div id="progress-bar-container"><div id="progress-bar"></div></div>
<div id="overrun"></div>
<h2 id="section-title">Church Schedule Timer</h2>
<div id="remaining-time">Remaining Schedule Time: --:--</div>

<div class="bottom-container">
  <div class="controls">
    <button onclick="startTimer()">Start</button>
    <button onclick="pauseTimer()">Pause</button>
    <button onclick="resetTimer()">Reset</button>
    <button onclick="previousSection()">Back</button>
    <button onclick="nextSection()">Next</button>
  </div>
  <button class="menu-toggle" onclick="toggleMenu()">Toggle Schedule Menu</button>
  <div id="menu-section">
    <div class="controls">
      <input type="text" id="section-name" placeholder="Name" />
      <input type="number" id="minutes" placeholder="Min" min="0" />
      <input type="number" id="seconds" placeholder="Sec" min="0" max="59" />
      <button onclick="addSection()">Add</button>
    </div>
    <div id="section-list" ondragover="event.preventDefault()" ondrop="dropSection(event)"></div>
  </div>
</div>

<script>
// --- YOUR EXISTING JAVASCRIPT LOGIC REMAINS UNCHANGED ---
const firebaseConfig = {
  apiKey: "AIzaSyD056thmGLxTwVOU01Qy_KNIqS4aqdW8Bw",
  authDomain: "clockapp-26b10.firebaseapp.com",
  projectId: "clockapp-26b10",
  storageBucket: "clockapp-26b10.firebasestorage.app",
  messagingSenderId: "381529267609",
  appId: "1:381529267609:web:3b6565b1b60c2c72acc708",
  measurementId: "G-SX7DKY8WPQ"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

let sections=[], currentSection=0, timeLeft=0, isRunning=false, dragStartIndex=null, overrunTime=0;

function format(seconds){ const m=Math.floor(Math.abs(seconds)/60); const s=Math.abs(seconds)%60; return `${m}:${s.toString().padStart(2,'0')}`; }
function formatHMS(seconds){ const absSec=Math.abs(seconds); const h=Math.floor(absSec/3600); const m=Math.floor((absSec%3600)/60); const s=absSec%60; return h>0?`${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`:`${m}:${s.toString().padStart(2,'0')}`; }

function updateDisplay(){
  const timerEl=document.getElementById("timer");
  const overrunEl=document.getElementById("overrun");
  if(timeLeft>=0){
    timerEl.textContent=format(timeLeft);
    timerEl.style.color="#22c55e";
    overrunEl.textContent=overrunTime>0?`Overrun: ${format(overrunTime)}`:'';
  } else {
    timerEl.textContent="00:00";
    timerEl.style.color="#ef4444";
    overrunEl.textContent=`Overrun: ${format(Math.abs(timeLeft))}`;
  }
  updateProgressBar();
  updateRemainingTime();
}

function updateProgressBar(){
  const total=sections[currentSection]?.duration||1;
  const remaining=Math.max(timeLeft,0);
  const percent=(remaining/total)*100;
  const progressBar=document.getElementById("progress-bar");
  if(percent>50) progressBar.style.backgroundColor="#22c55e";
  else if(percent>20) progressBar.style.backgroundColor="#f97316";
  else progressBar.style.backgroundColor="#ef4444";
  progressBar.style.width=percent+"%";
}

function updateTitle(){ document.getElementById("section-title").textContent = sections[currentSection]?.name || "Church Schedule Timer"; }

function updateRemainingTime(){
  const remainingTimeEl=document.getElementById("remaining-time");
  let remainingSeconds=Math.max(timeLeft,0)+overrunTime;
  for(let i=currentSection+1;i<sections.length;i++) remainingSeconds+=sections[i].duration;
  remainingTimeEl.textContent="Remaining Schedule Time: "+formatHMS(remainingSeconds);
}

function saveState(){
  database.ref('timerState').set({
    secretKey:'PickAllPokemons98', sections, currentSection, timeLeft, isRunning, overrunTime, lastUpdated: Date.now()
  });
}

function startTimer(){ if(!sections[currentSection]||isRunning) return; isRunning=true; saveState(); }
function pauseTimer(){ if(!isRunning) return; isRunning=false; saveState(); }
function resetTimer(){ timeLeft=sections[currentSection]?.duration||0; overrunTime=0; isRunning=false; saveState(); }

function nextSection(){ 
  if(currentSection<sections.length-1){ 
    if(timeLeft<0) overrunTime=Math.abs(timeLeft); else overrunTime=0;
    currentSection++; timeLeft=sections[currentSection]?.duration||0; overrunTime=0; isRunning=true; saveState(); 
  } 
}
function previousSection(){ 
  if(currentSection>0){ 
    if(timeLeft<0) overrunTime=Math.abs(timeLeft); else overrunTime=0;
    currentSection--; timeLeft=sections[currentSection]?.duration||0; overrunTime=0; isRunning=true; saveState(); 
  } 
}

function addSection(){
  const name=document.getElementById("section-name").value.trim();
  const minutes=parseInt(document.getElementById("minutes").value)||0;
  const seconds=parseInt(document.getElementById("seconds").value)||0;
  const duration=minutes*60+seconds;
  if(!name||duration<=0) return;
  sections.push({name,duration});
  document.getElementById("section-name").value="";
  document.getElementById("minutes").value="";
  document.getElementById("seconds").value="";
  saveState();
}
function removeSection(index){ 
  if(isRunning) return alert("Pause timer before removing sections."); 
  if(index<0||index>=sections.length) return; 
  sections.splice(index,1); 
  if(currentSection>=sections.length) currentSection=sections.length-1; 
  timeLeft=sections[currentSection]?.duration||0; saveState(); 
}

function dragStart(e){ dragStartIndex=+e.target.getAttribute("data-index"); }
function dropSection(e){ 
  const dropTarget=e.target.closest(".section-item"); 
  if(!dropTarget) return; 
  const dropIndex=+dropTarget.getAttribute("data-index"); 
  const item=sections.splice(dragStartIndex,1)[0]; 
  sections.splice(dropIndex,0,item); 
  if(currentSection===dragStartIndex) currentSection=dropIndex; 
  else if(currentSection>dragStartIndex&&currentSection<=dropIndex) currentSection--; 
  else if(currentSection<dragStartIndex&&currentSection>=dropIndex) currentSection++; 
  saveState(); 
}

function renderSections(){ 
  const list=document.getElementById("section-list"); 
  list.innerHTML=""; 
  sections.forEach((s,i)=>{
    const div=document.createElement("div"); 
    div.className="section-item"; div.setAttribute("draggable",true); div.setAttribute("data-index",i); div.ondragstart=dragStart; 
    if(i===currentSection) div.classList.add("active"); 
    div.innerHTML=`<span>${s.name} (${format(s.duration)})</span><button class="remove-btn" onclick="removeSection(${i})">X</button>`;
    div.ondblclick = ()=>{
      if(timeLeft<0) overrunTime=Math.abs(timeLeft); else overrunTime=0;
      currentSection=i; timeLeft=sections[currentSection]?.duration||0; overrunTime=0; isRunning=true; saveState(); renderSections(); updateDisplay();
    };
    list.appendChild(div); 
  }); 
  updateTitle(); 
}

function toggleMenu(){ const menu=document.getElementById("menu-section"); menu.style.display=menu.style.display==="block"?"none":"block"; }

function listenFirebase(){
  database.ref('timerState').on('value',(snapshot)=>{
    const data=snapshot.val();
    if(!data||data.secretKey!=='PickAllPokemons98') return;
    sections=data.sections||[]; currentSection=data.currentSection??0;
    if(data.lastUpdated){
      const elapsed=Math.floor((Date.now() - data.lastUpdated)/1000);
      timeLeft=(data.timeLeft??(sections[currentSection]?.duration||0)) - (data.isRunning?elapsed:0);
      overrunTime = data.overrunTime || 0;
    } else {
      timeLeft=data.timeLeft??(sections[currentSection]?.duration||0); overrunTime = data.overrunTime || 0;
    }
    isRunning=data.isRunning||false; renderSections(); updateDisplay();
  });
}

setInterval(()=>{
  if(isRunning){
    timeLeft--; if(timeLeft<0) overrunTime=Math.abs(timeLeft); saveState();
  }
  updateDisplay();
},1000);

window.onload=()=>{ listenFirebase(); updateDisplay(); };
</script>
</body>
</html>
