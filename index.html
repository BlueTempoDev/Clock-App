<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synced Timer App</title>
  <style>
    body {
      background: #0f172a;
      color: #f8fafc;
      font-family: "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
    }

    #sectionName {
      font-size: 1.2rem;
      color: #94a3b8;
      margin-bottom: 0.5rem;
    }

    #timer {
      font-size: 4rem;
      font-weight: bold;
      margin-bottom: 0.5rem;
    }

    #overrun {
      font-size: 1.1rem;
      color: #ef4444;
    }

    #progressBar {
      width: 80%;
      height: 25px;
      border-radius: 1rem;
      overflow: hidden;
      background: linear-gradient(to right, #22c55e, #f97316, #ef4444);
      position: relative;
      margin: 1rem 0;
    }

    #progressFill {
      position: absolute;
      top: 0;
      right: 0;
      height: 100%;
      width: 0%;
      background: #0f172a;
      transition: width 1s linear;
    }

    .controls button {
      margin: 0.3rem;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 0.5rem;
      background: #334155;
      color: white;
      cursor: pointer;
    }

    .controls button:hover {
      background: #475569;
    }

    #stats {
      margin-top: 1rem;
      font-size: 1.1rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <h1>⏱ Synced Timer</h1>

  <div id="sectionName"></div>
  <div id="timer">00:00</div>
  <div id="overrun"></div>

  <div id="progressBar">
    <div id="progressFill"></div>
  </div>

  <div class="controls">
    <button id="prevBtn">Previous</button>
    <button id="startBtn">Start</button>
    <button id="pauseBtn">Pause</button>
    <button id="nextBtn">Next</button>
  </div>

  <div id="stats">
    Total: <span id="totalTime">00:00</span> • Predicted End: <span id="predictedEnd">--:--</span>
  </div>

  <script>
    // ========== Variables ==========
    let schedule = [
      { name: "Intro", duration: 60 },
      { name: "Main Session", duration: 120 },
      { name: "Break", duration: 30 },
      { name: "Wrap-up", duration: 45 },
    ];

    let currentIndex = 0;
    let timeLeft = schedule[0].duration;
    let isRunning = false;
    let predictedEndTime = null; // only set once

    // ========== Utility ==========
    function format(seconds) {
      const m = Math.floor(Math.abs(seconds) / 60)
        .toString()
        .padStart(2, "0");
      const s = Math.abs(seconds % 60).toString().padStart(2, "0");
      return `${m}:${s}`;
    }

    // ========== Core Functions ==========
    function updateDisplay() {
      const timerEl = document.getElementById("timer");
      const overrunEl = document.getElementById("overrun");
      const sectionEl = document.getElementById("sectionName");

      sectionEl.textContent = schedule[currentIndex].name;

      if (timeLeft >= 0) {
        timerEl.textContent = format(timeLeft);
        timerEl.style.color = "#22c55e";
        overrunEl.textContent = "";
      } else {
        timerEl.textContent = "00:00";
        timerEl.style.color = "#ef4444";
        overrunEl.textContent = `Overrun: ${format(timeLeft)}`;
      }

      updateProgressBar();
      updateTotalAndEnd();
    }

    function updateProgressBar() {
      const fill = document.getElementById("progressFill");
      const total = schedule[currentIndex].duration;
      const remaining = Math.max(timeLeft, 0);
      const percentElapsed = 100 - (remaining / total) * 100;
      fill.style.width = `${percentElapsed}%`;
    }

    function updateTotalAndEnd() {
      const totalTimeEl = document.getElementById("totalTime");
      const endTimeEl = document.getElementById("predictedEnd");

      const totalSeconds = schedule.reduce(
        (acc, s) => acc + s.duration,
        0
      );
      totalTimeEl.textContent = format(totalSeconds);

      // Only calculate once per session
      if (!predictedEndTime) {
        const now = new Date();
        predictedEndTime = new Date(now.getTime() + totalSeconds * 1000);
      }

      const hours = predictedEndTime
        .getHours()
        .toString()
        .padStart(2, "0");
      const minutes = predictedEndTime
        .getMinutes()
        .toString()
        .padStart(2, "0");

      endTimeEl.textContent = `${hours}:${minutes}`;
    }

    function nextSection() {
      if (currentIndex < schedule.length - 1) {
        currentIndex++;
        timeLeft = schedule[currentIndex].duration;
        updateDisplay();
      }
    }

    function prevSection() {
      if (currentIndex > 0) {
        currentIndex--;
        timeLeft = schedule[currentIndex].duration;
        updateDisplay();
      }
    }

    // ========== Timer Loop ==========
    setInterval(() => {
      if (isRunning) {
        timeLeft--;
      }
      updateDisplay();
    }, 1000);

    // ========== Controls ==========
    document.getElementById("startBtn").addEventListener("click", () => (isRunning = true));
    document.getElementById("pauseBtn").addEventListener("click", () => (isRunning = false));
    document.getElementById("nextBtn").addEventListener("click", nextSection);
    document.getElementById("prevBtn").addEventListener("click", prevSection);

    // ========== Init ==========
    updateDisplay();
  </script>
</body>
</html>
