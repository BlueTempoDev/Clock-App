<script>
  const bar = document.getElementById("progress-bar");
  const timeDisplay = document.getElementById("time-display");

  let totalDuration = 0;
  let endTime = 0;

  function loadFromFirebase() {
    firebase.database().ref("timer").on("value", (snapshot) => {
      const data = snapshot.val();
      if (!data) return;

      totalDuration = data.totalDuration;
      endTime = data.endTime;
    });
  }

  function formatTime(ms) {
    const totalSec = Math.max(0, Math.floor(ms / 1000));
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;

    if (h > 0) return `${h}:${m.toString().padStart(2, "0")}:${s.toString().padStart(2, "0")}`;
    return `${m}:${s.toString().padStart(2, "0")}`;
  }

  function updateViewer() {
    const now = Date.now();
    const remaining = endTime - now;

    // Smooth bar percentage (updates every 50ms)
    const percent = Math.max(0, Math.min(1, remaining / totalDuration));
    bar.style.width = `${percent * 100}%`;

    // Only update the text every second (no brrr)
    if (!updateViewer.lastTextUpdate || now - updateViewer.lastTextUpdate >= 1000) {
      timeDisplay.textContent = formatTime(remaining);
      updateViewer.lastTextUpdate = now;
    }
  }

  loadFromFirebase();
  setInterval(updateViewer, 50); // SMOOTH as butter
</script>
