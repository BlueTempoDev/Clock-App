<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Tempo Clock - Viewer</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
/* --- RESPONSIVE VIEWER STYLING --- */
html, body { 
  margin: 0; 
  padding: 0; 
  height: 100%; 
  background-color: #1a1a1a; /* Charcoal Grey */
  color: #fff; 
  font-family: sans-serif; 
  overflow: hidden; 
}
body { 
  display: flex; 
  flex-direction: column; 
  justify-content: center; 
  align-items: center; 
  height: 100vh; 
  text-align: center; 
  box-sizing: border-box; 
  padding: 20px; 
}

/* DYNAMIC TEXT SIZING & SMOOTH FADE */
#timer, #remaining-time { 
  transition: opacity 0.4s ease; 
  opacity: 0; 
}

#timer { 
  font-size: clamp(6rem, 35vw, 22rem); 
  font-weight: 900; 
  margin: 0; 
  user-select: none; 
  line-height: 0.9; 
}

#section-title { 
  font-size: clamp(1.8rem, 8vw, 4rem); 
  opacity: 0.9; 
  margin: 0.5rem 0; 
  user-select: none; 
  font-weight: bold; 
}

#overrun, #remaining-time { 
  font-size: clamp(1.2rem, 5vw, 3rem); 
  opacity: 0.8; 
  margin: 0.25rem 0; 
  user-select: none; 
}

#overrun { 
  color: #ef4444; 
  min-height: 3.5rem; 
  font-weight: bold; 
}

/* PROGRESS BAR */
#progress-bar-container { 
  width: 95%; 
  max-width: 1200px; 
  height: clamp(20px, 5vw, 60px); 
  background: #333; 
  border-radius: 15px; 
  overflow: hidden; 
  margin: 1.5rem auto; 
  position: relative; 
  border: 2px solid #444; 
}

#progress-bar { 
  height: 100%; 
  width: 100%; 
  background-color: #22c55e; 
  transition: width 0.1s linear, background-color 0.5s linear; 
}

/* --- LANDSCAPE OPTIMIZATION --- */
@media (orientation: landscape) and (max-height: 500px) {
  body { justify-content: center; padding: 10px; }
  #timer { font-size: 42vh; } 
  #section-title { font-size: 1.4rem; margin: 0; order: -1; }
  #overrun { min-height: 1.2rem; font-size: 1rem; margin: 2px 0; }
  #remaining-time { font-size: 1rem; margin: 0; }
  #progress-bar-container { height: 12px; margin: 5px auto; border-radius: 5px; }
}
</style>
</head>
<body>

<h2 id="section-title">Tempo Clock</h2>
<div id="timer">00:00</div>
<div id="progress-bar-container"><div id="progress-bar"></div></div>
<div id="overrun"></div>
<div id="remaining-time">Remaining Schedule Time: 00:00</div>

<script>
// --- FIREBASE CONFIG ---
const firebaseConfig = {
  apiKey: "AIzaSyD056thmGLxTwVOU01Qy_KNIqS4aqdW8Bw",
  authDomain: "clockapp-26b10.firebaseapp.com",
  projectId: "clockapp-26b10",
  storageBucket: "clockapp-26b10.firebasestorage.app",
  messagingSenderId: "381529267609",
  appId: "1:381529267609:web:3b6565b1b60c2c72acc708",
  measurementId: "G-SX7DKY8WPQ"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

let sections = [], currentSection = 0, timeLeft = 0, isRunning = false, overrunTime = 0;
let lastUpdate = Date.now();

function format(seconds) {
  const m = Math.floor(Math.abs(seconds) / 60);
  const s = Math.abs(seconds) % 60;
  return `${m}:${s.toString().padStart(2,'0')}`;
}

function formatHMS(seconds) {
  const absSec = Math.abs(seconds);
  const h = Math.floor(absSec / 3600);
  const m = Math.floor((absSec % 3600) / 60);
  const s = absSec % 60;
  return h > 0 ? `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}` : `${m}:${s.toString().padStart(2,'0')}`;
}

function updateDisplay(){
  const timerEl = document.getElementById("timer");
  const remainingEl = document.getElementById("remaining-time");
  const overrunEl = document.getElementById("overrun");
  const displayTime = Math.floor(timeLeft);

  timerEl.style.opacity = "1";
  remainingEl.style.opacity = "1";

  if(displayTime >= 0){
    timerEl.textContent = format(displayTime);
    timerEl.style.color = "#22c55e";
    overrunEl.textContent = overrunTime > 0 ? `Overrun: ${format(overrunTime)}` : '';
  } else {
    timerEl.textContent = "00:00";
    timerEl.style.color = "#ef4444";
    overrunEl.textContent = `Overrun: ${format(Math.floor(Math.abs(timeLeft)))}`;
  }
  updateProgressBar();
  updateRemainingTime();
}

function updateProgressBar(){
  const total = sections[currentSection]?.duration || 1;
  const remaining = Math.max(timeLeft,0);
  const percent = (remaining / total) * 100;
  const progressBar = document.getElementById("progress-bar");
  
  if(percent > 50) progressBar.style.backgroundColor = "#22c55e";
  else if(percent > 20) progressBar.style.backgroundColor = "#f97316";
  else progressBar.style.backgroundColor = "#ef4444";
  
  progressBar.style.width = percent + "%";
}

function updateTitle(){
  document.getElementById("section-title").textContent = sections[currentSection]?.name || "Tempo Clock";
}

function updateRemainingTime(){
  const remainingTimeEl = document.getElementById("remaining-time");
  let remainingSeconds = Math.max(timeLeft,0) + overrunTime;
  for(let i = currentSection+1; i < sections.length; i++) remainingSeconds += sections[i].duration;
  remainingTimeEl.textContent = "Remaining Schedule Time: " + formatHMS(Math.floor(remainingSeconds));
}

function listenFirebase(){
  database.ref('timerState').on('value', (snapshot) => {
    const data = snapshot.val();
    if(!data || data.secretKey !== 'PickAllPokemons98') return;
    sections = data.sections || [];
    currentSection = data.currentSection ?? 0;
    const elapsed = data.lastUpdated ? (Date.now() - data.lastUpdated)/1000 : 0;
    timeLeft = (data.timeLeft ?? (sections[currentSection]?.duration || 0)) - (data.isRunning ? elapsed : 0);
    overrunTime = data.overrunTime || 0;
    isRunning = data.isRunning || false;
    updateDisplay();
    updateTitle();
  });
}

function smoothUpdate(){
  const now = Date.now();
  const delta = (now - lastUpdate)/1000;
  lastUpdate = now;
  if(isRunning && sections[currentSection]){
    timeLeft -= delta;
    overrunTime = timeLeft < 0 ? Math.abs(timeLeft) : 0;
    updateDisplay();
  }
  requestAnimationFrame(smoothUpdate);
}

window.onload = () => {
  listenFirebase();
  lastUpdate = Date.now();
  smoothUpdate();
};
</script>
</body>
</html>
