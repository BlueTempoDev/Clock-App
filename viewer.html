<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Church Clock Viewer - Real-Time</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
html, body {
  margin: 0; padding: 0; height: 100%;
  background-color: #000;
  color: #fff;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  overflow: hidden;
  padding: 0 5vw;
  box-sizing: border-box;
}
#timer {
  font-weight: 900;
  color: #22c55e;
  line-height: 1;
  user-select: none;
  font-size: 20vw;
  max-font-size: 120px;
  min-font-size: 40px;
  padding: 0 5vw;
}
#progress-bar-container {
  width: 80vw;
  max-width: 500px;
  height: 20px;
  background: #333;
  border-radius: 10px;
  overflow: hidden;
  margin: 1rem auto 0.5rem auto;
}
#progress-bar {
  height: 100%;
  width: 0%;
  background: #22c55e;
  transition: width 0.3s linear, background-color 0.3s linear;
}
#overrun {
  font-size: 5vw;
  color: #ef4444;
  margin: 0.25rem 0 0.5rem 0;
  min-height: 2.5rem;
  user-select: none;
}
#section-title {
  font-size: 6vw;
  opacity: 0.8;
  margin: 0 0 0.5rem 0;
  user-select: none;
}
#remaining-time, #total-time, #predicted-end {
  font-size: 4vw;
  opacity: 0.6;
  margin: 0.2rem 0;
  user-select: none;
}
@media (min-width: 600px) {
  #timer { font-size: 120px !important; }
  #overrun { font-size: 24px !important; }
  #section-title { font-size: 32px !important; }
  #remaining-time, #total-time, #predicted-end { font-size: 16px !important; }
}
</style>
</head>
<body>

<div id="timer">--:--</div>
<div id="progress-bar-container"><div id="progress-bar"></div></div>
<div id="overrun"></div>
<h2 id="section-title">Loading...</h2>
<div id="remaining-time">Remaining Schedule Time: --:--</div>
<div id="total-time">Total Schedule Time: --:--</div>
<div id="predicted-end">Predicted End: --:--</div>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyD056thmGLxTwVOU01Qy_KNIqS4aqdW8Bw",
  authDomain: "clockapp-26b10.firebaseapp.com",
  projectId: "clockapp-26b10",
  storageBucket: "clockapp-26b10.firebasestorage.app",
  messagingSenderId: "381529267609",
  appId: "1:381529267609:web:3b6565b1b60c2c72acc708",
  measurementId: "G-SX7DKY8WPQ"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// Elements
const timerEl = document.getElementById("timer");
const overrunEl = document.getElementById("overrun");
const sectionTitleEl = document.getElementById("section-title");
const progressBar = document.getElementById("progress-bar");
const remainingTimeEl = document.getElementById("remaining-time");
const totalTimeEl = document.getElementById("total-time");
const predictedEndEl = document.getElementById("predicted-end");

// State
let sections = [];
let currentSection = 0;
let sectionStartTime = 0; // timestamp from Firebase
let sectionDuration = 0;

// Format seconds to mm:ss
function format(seconds) {
  const isNegative = seconds < 0;
  seconds = Math.abs(seconds);
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return (isNegative ? "-" : "") + `${m}:${s.toString().padStart(2,"0")}`;
}

// Update progress bar
function updateProgressBar(timeLeft, total) {
  if (total <= 0) return;
  const remaining = Math.max(timeLeft, 0);
  const percent = ((total - remaining) / total) * 100;
  progressBar.style.width = `${percent}%`;

  if (percent < 50) progressBar.style.backgroundColor = "#22c55e"; // green
  else if (percent < 80) progressBar.style.backgroundColor = "#facc15"; // orange
  else progressBar.style.backgroundColor = "#ef4444"; // red
}

// Calculate remaining schedule time
function calculateRemaining() {
  let remaining = Math.max(getTimeLeft(), 0);
  for (let i = currentSection + 1; i < sections.length; i++) remaining += sections[i].duration;
  return remaining;
}

// Calculate total schedule time
function calculateTotal() {
  return sections.reduce((acc, s) => acc + s.duration, 0);
}

// Calculate time left based on Firebase timestamp
function getTimeLeft() {
  const now = Date.now() / 1000; // seconds
  return Math.round(sectionDuration - (now - sectionStartTime));
}

// Update all UI
function updateUI() {
  if (!sections[currentSection]) {
    timerEl.textContent = "--:--";
    sectionTitleEl.textContent = "No Active Section";
    progressBar.style.width = "0%";
    overrunEl.textContent = "";
    remainingTimeEl.textContent = "Remaining Schedule Time: --:--";
    totalTimeEl.textContent = "Total Schedule Time: --:--";
    predictedEndEl.textContent = "Predicted End: --:--";
    return;
  }

  const timeLeft = getTimeLeft();

  sectionTitleEl.textContent = sections[currentSection].name;
  if (timeLeft >= 0) {
    timerEl.textContent = format(timeLeft);
    timerEl.style.color = "#22c55e";
    overrunEl.textContent = "";
  } else {
    timerEl.textContent = "00:00";
    timerEl.style.color = "#ef4444";
    overrunEl.textContent = `Overrun: ${format(timeLeft)}`;
  }

  updateProgressBar(timeLeft, sectionDuration);

  const remainingSeconds = calculateRemaining();
  remainingTimeEl.textContent = "Remaining Schedule Time: " + format(remainingSeconds);

  const totalSeconds = calculateTotal();
  totalTimeEl.textContent = "Total Schedule Time: " + format(totalSeconds);

  const predictedEnd = new Date(Date.now() + remainingSeconds * 1000);
  predictedEndEl.textContent = "Predicted End: " + predictedEnd.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// Firebase listener
database.ref('timerState').on('value', (snapshot) => {
  const data = snapshot.val();
  if (!data || !data.sections) return;

  sections = data.sections;
  currentSection = data.currentSection ?? 0;
  sectionDuration = sections[currentSection]?.duration || 1;
  sectionStartTime = Date.now() / 1000 - (sectionDuration - (data.timeLeft ?? sectionDuration));

  updateUI();
});

// Update UI every 200ms for smooth countdown
setInterval(updateUI, 200);

</script>
</body>
</html>
