<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Timer Viewer</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #111;
        font-family: Arial, sans-serif;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* Title */
    h1 {
        margin-top: 20px;
        font-size: 28px;
        font-weight: bold;
    }

    /* Outer bar container (STATIC SIZE) */
    .bar-container {
        width: 80%;      /* Always same size */
        max-width: 900px;
        height: 25px;
        background: #333;
        border-radius: 12px;
        margin-top: 30px;
        overflow: hidden;
    }

    /* Progress bar (smooth transition) */
    .bar-fill {
        height: 100%;
        background: #4caf50;
        width: 0%;
        transition: width 0.25s linear;
    }

    .time-text {
        margin-top: 12px;
        font-size: 20px;
        font-weight: 600;
    }
</style>
</head>

<body>

<h1>Event Timer</h1>

<div class="bar-container">
    <div class="bar-fill" id="barFill"></div>
</div>

<div class="time-text" id="timeText">--:-- / --:--</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    databaseURL: "YOUR_DB_URL",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_BUCKET",
    messagingSenderId: "YOUR_ID",
    appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const bar = document.getElementById("barFill");
const text = document.getElementById("timeText");

onValue(ref(db, "timer"), (snapshot) => {
    const data = snapshot.val();
    if (!data || !data.totalTime || !data.remainingTime) return;

    const total = data.totalTime;
    const remaining = data.remainingTime;

    // Percent
    const progress = ((total - remaining) / total) * 100;
    bar.style.width = progress + "%";

    // Convert seconds → mm:ss
    const fmt = (sec) => {
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        return `${m}:${s.toString().padStart(2, "0")}`;
    };

    text.textContent = `${fmt(total - remaining)} / ${fmt(total)}`;
});
</script>

</body>
</html>
