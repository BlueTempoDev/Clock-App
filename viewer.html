<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Church Clock Viewer - Mobile Friendly</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
html, body {
  margin: 0; padding: 0; height: 100%;
  background-color: #000;
  color: #fff;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  overflow: hidden;
  padding: 0 5vw;
  box-sizing: border-box;
}

#timer {
  font-weight: 900;
  color: #22c55e;
  line-height: 1;
  user-select: none;
  font-size: 20vw;
  transition: font-size 0.2s;
}

#progress-bar-container {
  width: 90vw;
  max-width: 600px;
  height: 20px;
  background: #333;
  border-radius: 10px;
  overflow: hidden;
  margin: 1rem auto 0.5rem auto;
}

#progress-bar {
  height: 100%;
  width: 0%;
  background: #22c55e;
  transition: width 0.5s linear, background-color 0.5s ease;
}

#overrun {
  font-size: 5vw;
  color: #ef4444;
  margin: 0.25rem 0 0.5rem 0;
  min-height: 2.5rem;
  user-select: none;
}

#section-title {
  font-size: 6vw;
  opacity: 0.8;
  margin: 0 0 0.5rem 0;
  user-select: none;
}

#remaining-time, #total-time, #predicted-end {
  font-size: 4vw;
  opacity: 0.6;
  margin: 0.2rem 0;
  user-select: none;
}

#scale-container {
  margin: 1rem 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#scale-label {
  margin-bottom: 0.25rem;
}

#scale-slider {
  width: 80vw;
  max-width: 300px;
}

@media (min-width: 600px) {
  #timer { font-size: 120px !important; }
  #overrun { font-size: 24px !important; }
  #section-title { font-size: 32px !important; }
  #remaining-time, #total-time, #predicted-end { font-size: 16px !important; }
}
</style>
</head>
<body>

<div id="timer">--:--</div>
<div id="progress-bar-container"><div id="progress-bar"></div></div>
<div id="overrun"></div>
<h2 id="section-title">Loading...</h2>

<div id="remaining-time">Remaining Schedule Time: --:--</div>
<div id="total-time">Total Schedule Time: --:--</div>
<div id="predicted-end">Predicted End: --:--</div>

<div id="scale-container">
  <div id="scale-label">Timer Scale</div>
  <input type="range" id="scale-slider" min="5" max="50" value="20">
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD056thmGLxTwVOU01Qy_KNIqS4aqdW8Bw",
  authDomain: "clockapp-26b10.firebaseapp.com",
  projectId: "clockapp-26b10",
  storageBucket: "clockapp-26b10.firebasestorage.app",
  messagingSenderId: "381529267609",
  appId: "1:381529267609:web:3b6565b1b60c2c72acc708",
  measurementId: "G-SX7DKY8WPQ"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

const timerEl = document.getElementById("timer");
const overrunEl = document.getElementById("overrun");
const sectionTitleEl = document.getElementById("section-title");
const progressBar = document.getElementById("progress-bar");
const remainingTimeEl = document.getElementById("remaining-time");
const totalTimeEl = document.getElementById("total-time");
const predictedEndEl = document.getElementById("predicted-end");
const scaleSlider = document.getElementById("scale-slider");

// Timer scale slider
scaleSlider.addEventListener("input", () => {
  timerEl.style.fontSize = `${scaleSlider.value}vw`;
});

// Format seconds into mm:ss
function formatClock(seconds){
  const m = Math.floor(Math.abs(seconds)/60);
  const s = Math.abs(seconds)%60;
  return `${m}:${s.toString().padStart(2,'0')}`;
}

// Format seconds into hr min (e.g., 1hr 3min)
function formatTime(seconds){
  const absSeconds = Math.abs(seconds);
  const h = Math.floor(absSeconds/3600);
  const m = Math.floor((absSeconds%3600)/60);
  return h>0 ? `${h}hr ${m}min` : `${m}min`;
}

// Progress bar coloring green → orange → red
function updateProgressBar(timeLeft, total){
  if(total<=0) return;
  const remaining = Math.max(timeLeft,0);
  const percent = ((total-remaining)/total)*100;
  progressBar.style.width = `${percent}%`;
  if(percent<50) progressBar.style.backgroundColor="#22c55e";
  else if(percent<80) progressBar.style.backgroundColor="#facc15";
  else progressBar.style.backgroundColor="#ef4444";
}

// Calculate remaining schedule seconds
function calculateRemaining(sections,currentSection,timeLeft){
  let remainingSeconds = timeLeft;
  for(let i=currentSection+1;i<sections.length;i++) remainingSeconds+=sections[i].duration;
  return remainingSeconds;
}

// Calculate total schedule seconds
function calculateTotal(sections){
  return sections.reduce((acc,s)=>acc+s.duration,0);
}

// Update all UI
function updateUI(data){
  if(!data){
    timerEl.textContent="--:--";
    sectionTitleEl.textContent="No Timer Data";
    progressBar.style.width="0%";
    overrunEl.textContent="";
    remainingTimeEl.textContent="Remaining Schedule Time: --:--";
    totalTimeEl.textContent="Total Schedule Time: --:--";
    predictedEndEl.textContent="Predicted End: --:--";
    return;
  }

  const sections = data.sections||[];
  const currentSection = data.currentSection??0;
  let timeLeft = data.timeLeft??0;

  sectionTitleEl.textContent=sections[currentSection]?.name || "No Active Section";

  if(timeLeft>=0){
    timerEl.textContent=formatClock(timeLeft);
    timerEl.style.color="#22c55e";
    overrunEl.textContent="";
  } else {
    timerEl.textContent="00:00";
    timerEl.style.color="#ef4444";
    overrunEl.textContent=`Overrun: ${formatClock(timeLeft)}`;
  }

  const totalDuration = sections[currentSection]?.duration || 1;
  updateProgressBar(timeLeft,totalDuration);

  const remainingSeconds = calculateRemaining(sections,currentSection,timeLeft);
  remainingTimeEl.textContent="Remaining Schedule Time: "+formatTime(remainingSeconds);

  const totalSeconds = calculateTotal(sections);
  totalTimeEl.textContent="Total Schedule Time: "+formatTime(totalSeconds);

  const predictedEnd = new Date(Date.now() + remainingSeconds*1000);
  predictedEndEl.textContent="Predicted End: "+predictedEnd.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

// Live Firebase listener
database.ref('timerState').on('value',(snapshot)=>{
  updateUI(snapshot.val());
});

// Update UI every second to refresh progress bar & predicted end
setInterval(()=>{
  database.ref('timerState').once('value').then(snapshot=>{
    updateUI(snapshot.val());
  });
},1000);

</script>
</body>
</html>
