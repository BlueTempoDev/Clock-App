<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Church Clock Viewer</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
html, body {
  margin: 0; padding: 0; height: 100%;
  background-color: #000;
  color: #fff;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  overflow: hidden;
  padding: 0 5vw;
  box-sizing: border-box;
}
#timer {
  font-weight: 900;
  color: #22c55e;
  line-height: 1;
  user-select: none;
  font-size: 20vw;
  padding: 0 5vw;
  box-sizing: border-box;
}
#progress-bar-container {
  width: 90%;
  max-width: 600px;
  height: 20px;
  background: #333;
  border-radius: 10px;
  overflow: hidden;
  margin: 1rem auto 0.5rem auto;
}
#progress-bar {
  height: 100%;
  width: 0%;
  background: #22c55e;
  transition: width 0.5s linear, background-color 0.5s ease;
}
#overrun {
  font-size: 4vw;
  color: #ef4444;
  margin: 0.25rem 0 0.5rem 0;
  min-height: 2rem;
  user-select: none;
}
#section-title {
  font-size: 6vw;
  opacity: 0.8;
  margin: 0 0 0.5rem 0;
  user-select: none;
}
#remaining-time, #total-time, #predicted-end {
  font-size: 4vw;
  opacity: 0.6;
  margin: 0.2rem 0;
  user-select: none;
}
#scale-container {
  margin: 1rem 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  user-select: none;
}
#scale-slider { width: 150px; }
@media (min-width: 600px) {
  #timer { font-size: 120px !important; }
  #overrun { font-size: 24px !important; }
  #section-title { font-size: 32px !important; }
  #remaining-time, #total-time, #predicted-end { font-size: 16px !important; }
}
</style>
</head>
<body>

<div id="timer">--:--</div>
<div id="progress-bar-container"><div id="progress-bar"></div></div>
<div id="overrun"></div>
<h2 id="section-title">Loading...</h2>
<div id="remaining-time">Remaining Schedule Time: --:--</div>
<div id="total-time">Total Schedule Time: --:--</div>
<div id="predicted-end">Predicted End: --:--</div>

<div id="scale-container">
  <label for="scale-slider">Timer Scale:</label>
  <input type="range" id="scale-slider" min="50" max="300" value="200" />
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD056thmGLxTwVOU01Qy_KNIqS4aqdW8Bw",
  authDomain: "clockapp-26b10.firebaseapp.com",
  projectId: "clockapp-26b10",
  storageBucket: "clockapp-26b10.firebasestorage.app",
  messagingSenderId: "381529267609",
  appId: "1:381529267609:web:3b6565b1b60c2c72acc708",
  measurementId: "G-SX7DKY8WPQ"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

const timerEl = document.getElementById("timer");
const overrunEl = document.getElementById("overrun");
const sectionTitleEl = document.getElementById("section-title");
const progressBar = document.getElementById("progress-bar");
const remainingTimeEl = document.getElementById("remaining-time");
const totalTimeEl = document.getElementById("total-time");
const predictedEndEl = document.getElementById("predicted-end");
const scaleSlider = document.getElementById("scale-slider");

let sections = [];
let currentSection = 0;
let timeLeft = 0;

// Timer scale slider
scaleSlider.addEventListener("input", () => {
  timerEl.style.fontSize = scaleSlider.value + "px";
});

// Format seconds as MM:SS (no hours)
function formatMMSS(seconds) {
  const m = Math.floor(Math.abs(seconds) / 60);
  const s = Math.abs(seconds) % 60;
  return `${m}:${s.toString().padStart(2,"0")}`;
}

// Update progress bar
function updateProgressBar(timeLeft, total) {
  if (!total) return;
  const percent = Math.max(0, Math.min(100, ((total - timeLeft)/total)*100));
  progressBar.style.width = percent+"%";
  if(percent<50) progressBar.style.backgroundColor="#22c55e";
  else if(percent<80) progressBar.style.backgroundColor="#facc15";
  else progressBar.style.backgroundColor="#ef4444";
}

// Calculate remaining schedule
function calculateRemaining() {
  let rem = timeLeft;
  for(let i=currentSection+1;i<sections.length;i++) rem += sections[i].duration;
  return rem;
}

// Calculate total schedule
function calculateTotal() {
  return sections.reduce((acc,s)=>acc+s.duration,0);
}

// Update UI from Firebase snapshot
function updateUI(data){
  if(!data || data.secretKey!=='PickAllPokemons98'){
    timerEl.textContent="--:--";
    sectionTitleEl.textContent="No Timer Data";
    progressBar.style.width="0%";
    overrunEl.textContent="";
    remainingTimeEl.textContent="Remaining Schedule Time: --:--";
    totalTimeEl.textContent="Total Schedule Time: --:--";
    predictedEndEl.textContent="Predicted End: --:--";
    return;
  }

  sections = data.sections || [];
  currentSection = data.currentSection ?? 0;
  timeLeft = data.timeLeft ?? 0;

  const section = sections[currentSection] || {name:"No Active Section", duration:1};
  sectionTitleEl.textContent = section.name;

  // Display timeLeft exactly from Firebase
  if(timeLeft>=0){
    timerEl.textContent = formatMMSS(timeLeft);
    timerEl.style.color="#22c55e";
    overrunEl.textContent="";
  } else {
    timerEl.textContent="00:00";
    timerEl.style.color="#ef4444";
    overrunEl.textContent="Overrun: "+formatMMSS(timeLeft);
  }

  updateProgressBar(timeLeft, section.duration);

  remainingTimeEl.textContent="Remaining Schedule Time: "+formatMMSS(calculateRemaining());
  totalTimeEl.textContent="Total Schedule Time: "+formatMMSS(calculateTotal());

  const predictedEnd = new Date(Date.now() + calculateRemaining()*1000);
  predictedEndEl.textContent="Predicted End: "+predictedEnd.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

// Listen to Firebase and update immediately
database.ref('timerState').on('value', snapshot => {
  updateUI(snapshot.val());
});
</script>
</body>
</html>
