<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Church Clock Viewer</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
html, body {
  margin: 0; padding: 0; height: 100%;
  background-color: #000;
  color: #fff;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  overflow: hidden;
  padding: 0 2vw;
  box-sizing: border-box;
}
#timer {
  font-weight: 900;
  color: #22c55e;
  line-height: 1;
  user-select: none;
  font-size: 22vw;
}
#progress-bar-container {
  width: 100%;
  max-width: 1200px; /* match index width */
  height: 50px; /* index bar height */
  background: #333;
  border-radius: 12px;
  overflow: hidden;
  margin: 1rem 0;
}
#progress-bar {
  height: 100%;
  width: 100%;
  background: #22c55e;
  transition: width 0.25s linear, background-color 0.25s linear;
}
#overrun {
  font-size: 4vw;
  color: #ef4444;
  margin: 0.25rem 0 0.5rem 0;
  min-height: 2rem;
  user-select: none;
}
#section-title {
  font-size: 6vw;
  opacity: 0.9;
  margin: 0 0 0.5rem 0;
  user-select: none;
}
#remaining-time {
  font-size: 4vw;
  opacity: 0.8;
  margin: 0.2rem 0;
  user-select: none;
}
@media (min-width: 600px) {
  #timer { font-size: 130px !important; }
  #overrun { font-size: 28px !important; }
  #section-title { font-size: 36px !important; }
  #remaining-time { font-size: 24px !important; }
}
</style>
</head>
<body>

<div id="timer">--:--</div>
<div id="progress-bar-container"><div id="progress-bar"></div></div>
<div id="overrun"></div>
<h2 id="section-title">Loading...</h2>
<div id="remaining-time">Remaining Schedule Time: --:--</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD056thmGLxTwVOU01Qy_KNIqS4aqdW8Bw",
  authDomain: "clockapp-26b10.firebaseapp.com",
  projectId: "clockapp-26b10",
  storageBucket: "clockapp-26b10.firebasestorage.app",
  messagingSenderId: "381529267609",
  appId: "1:381529267609:web:3b6565b1b60c2c72acc708",
  measurementId: "G-SX7DKY8WPQ"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

const timerEl = document.getElementById("timer");
const overrunEl = document.getElementById("overrun");
const sectionTitleEl = document.getElementById("section-title");
const progressBar = document.getElementById("progress-bar");
const remainingTimeEl = document.getElementById("remaining-time");

let sections = [];
let currentSection = 0;
let timeLeft = 0;
let overrunTime = 0;
let isRunning = false;
let lastUpdated = Date.now();

function formatHMS(seconds) {
  const absSec = Math.abs(Math.floor(seconds));
  const h = Math.floor(absSec / 3600);
  const m = Math.floor((absSec % 3600) / 60);
  const s = absSec % 60;
  return h > 0 ? `${h}:${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}` : `${m}:${s.toString().padStart(2,"0")}`;
}

function calculateRemaining(displayTime) {
  let rem = Math.max(displayTime,0) + overrunTime;
  for(let i=currentSection+1;i<sections.length;i++) rem += sections[i].duration;
  return rem;
}

function renderUI(displayTime){
  const section = sections[currentSection] || {name:"No Active Section", duration:1};
  sectionTitleEl.textContent = section.name;

  // Timer display
  if(displayTime >= 0){
    timerEl.textContent = formatHMS(displayTime);
    timerEl.style.color="#22c55e";
    overrunEl.textContent = overrunTime>0 ? `Overrun: ${formatHMS(overrunTime)}` : '';
  } else {
    timerEl.textContent="00:00";
    timerEl.style.color="#ef4444";
    overrunEl.textContent="Overrun: "+formatHMS(Math.abs(displayTime));
  }

  // Progress bar shrinks with time
  let percent = displayTime >= 0 ? (displayTime/section.duration)*100 : 0;
  percent = Math.min(100, Math.max(0, percent));
  progressBar.style.width = percent+"%";

  // Color gradient
  if(percent > 50) progressBar.style.backgroundColor="#22c55e";
  else if(percent > 20) progressBar.style.backgroundColor="#f97316";
  else progressBar.style.backgroundColor="#ef4444";

  remainingTimeEl.textContent="Remaining Schedule Time: "+formatHMS(calculateRemaining(displayTime));
}

// Firebase real-time listener
database.ref('timerState').on('value', snapshot => {
  const data = snapshot.val();
  if(!data || data.secretKey!=='PickAllPokemons98') return;
  sections = data.sections || [];
  currentSection = data.currentSection ?? 0;
  timeLeft = data.timeLeft ?? 0;
  overrunTime = data.overrunTime ?? 0;
  isRunning = data.isRunning ?? false;
  lastUpdated = Date.now();
});

// Timer loop
setInterval(()=>{
  let displayTime = timeLeft;
  if(isRunning){
    const elapsed = Math.floor((Date.now() - lastUpdated)/1000);
    displayTime = timeLeft - elapsed;
    if(displayTime < 0) overrunTime = Math.abs(displayTime);
  }
  renderUI(displayTime);
}, 250);

</script>
</body>
</html>
