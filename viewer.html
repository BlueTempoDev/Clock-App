<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Church Clock Viewer</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background-color: #000;
    color: #fff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    overflow: hidden;
    padding: 0 5vw;
    box-sizing: border-box;
  }
  #timer {
    font-weight: 900;
    color: #22c55e;
    line-height: 1;
    user-select: none;
    font-size: 20vw;
    max-font-size: 120px;
    min-font-size: 40px;
    transition: font-size 0.2s;
  }
  #progress-bar-container {
    width: 90vw;
    max-width: 600px;
    height: 20px;
    background: #333;
    border-radius: 10px;
    overflow: hidden;
    margin: 1rem auto 0.5rem auto;
  }
  #progress-bar {
    height: 100%;
    width: 0%;
    background: #22c55e;
    transition: width 1s linear, background-color 0.5s ease;
  }
  #overrun {
    font-size: 5vw;
    color: #ef4444;
    margin: 0.25rem 0 0.5rem 0;
    min-height: 2.5rem;
    user-select: none;
  }
  #section-title {
    font-size: 6vw;
    opacity: 0.8;
    margin: 0 0 0.5rem 0;
    user-select: none;
  }
  #remaining-time, #total-time, #predicted-end {
    font-size: 4vw;
    opacity: 0.6;
    margin: 0.2rem 0;
    user-select: none;
  }
  #scale-slider-container {
    margin-top: 1rem;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.2rem;
  }
  input[type=range] {
    width: 200px;
  }

  @media (min-width: 600px) {
    #timer { font-size: 120px !important; }
    #overrun { font-size: 24px !important; }
    #section-title { font-size: 32px !important; }
    #remaining-time, #total-time, #predicted-end { font-size: 16px !important; }
  }
</style>
</head>
<body>

<div id="timer">--:--</div>
<div id="progress-bar-container"><div id="progress-bar"></div></div>
<div id="overrun"></div>
<h2 id="section-title">Loading...</h2>

<div id="remaining-time">Remaining Schedule Time: --:--</div>
<div id="total-time">Total Schedule Time: --:--</div>
<div id="predicted-end">Predicted End: --:--</div>

<div id="scale-slider-container">
  <label for="scale-slider">Timer Scale</label>
  <input type="range" id="scale-slider" min="0.5" max="3" value="1" step="0.05">
</div>

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyD056thmGLxTwVOU01Qy_KNIqS4aqdW8Bw",
    authDomain: "clockapp-26b10.firebaseapp.com",
    projectId: "clockapp-26b10",
    storageBucket: "clockapp-26b10.firebasestorage.app",
    messagingSenderId: "381529267609",
    appId: "1:381529267609:web:3b6565b1b60c2c72acc708",
    measurementId: "G-SX7DKY8WPQ"
  };

  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  const timerEl = document.getElementById("timer");
  const overrunEl = document.getElementById("overrun");
  const sectionTitleEl = document.getElementById("section-title");
  const progressBar = document.getElementById("progress-bar");
  const remainingTimeEl = document.getElementById("remaining-time");
  const totalTimeEl = document.getElementById("total-time");
  const predictedEndEl = document.getElementById("predicted-end");
  const scaleSlider = document.getElementById("scale-slider");

  let timerData = null;
  let localTimeLeft = 0;
  let currentSection = 0;
  let isRunning = false;

  // Format seconds to mm:ss or hh:mm
  function formatTime(seconds) {
    let absSec = Math.abs(seconds);
    const h = Math.floor(absSec / 3600);
    const m = Math.floor((absSec % 3600) / 60);
    const s = absSec % 60;
    if (h > 0) return `${h}h ${m}m`;
    return `${m}:${s.toString().padStart(2,'0')}`;
  }

  function updateProgressBar(timeLeft, total) {
    if (!total) total = 1;
    const remaining = Math.max(timeLeft, 0);
    const percent = ((total - remaining) / total) * 100;
    progressBar.style.width = `${percent}%`;

    // Green → Orange → Red
    if (percent < 50) {
      progressBar.style.backgroundColor = "#22c55e";
    } else if (percent < 80) {
      progressBar.style.backgroundColor = "#facc15";
    } else {
      progressBar.style.backgroundColor = "#ef4444";
    }
  }

  function calculateRemaining(sections, currentSection, timeLeft) {
    let remainingSeconds = timeLeft;
    for (let i = currentSection + 1; i < sections.length; i++) {
      remainingSeconds += sections[i].duration;
    }
    return remainingSeconds;
  }

  function calculateTotal(sections) {
    return sections.reduce((acc, s) => acc + s.duration, 0);
  }

  function updateUI(data) {
    if (!data) return;

    const sections = data.sections || [];
    currentSection = data.currentSection ?? 0;
    isRunning = data.isRunning ?? false;

    if (!sections[currentSection]) return;

    sectionTitleEl.textContent = sections[currentSection].name;

    // Timer display
    if (localTimeLeft >= 0) {
      timerEl.textContent = formatTime(localTimeLeft);
      timerEl.style.color = "#22c55e";
      overrunEl.textContent = "";
    } else {
      timerEl.textContent = "00:00";
      timerEl.style.color = "#ef4444";
      overrunEl.textContent = `Overrun: ${formatTime(localTimeLeft)}`;
    }

    updateProgressBar(localTimeLeft, sections[currentSection].duration);

    const remainingSeconds = calculateRemaining(sections, currentSection, localTimeLeft);
    remainingTimeEl.textContent = "Remaining Schedule Time: " + formatTime(remainingSeconds);

    const totalSeconds = calculateTotal(sections);
    totalTimeEl.textContent = "Total Schedule Time: " + formatTime(totalSeconds);

    const predictedEnd = new Date(Date.now() + remainingSeconds * 1000);
    predictedEndEl.textContent = "Predicted End: " + predictedEnd.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  }

  // Firebase listener
  database.ref('timerState').on('value', (snapshot) => {
    const data = snapshot.val();
    if (!data) return;

    timerData = data;
    localTimeLeft = data.timeLeft ?? 0;
    currentSection = data.currentSection ?? 0;
    isRunning = data.isRunning ?? false;

    updateUI(timerData);
  });

  // Local countdown every second
  setInterval(() => {
    if (timerData && isRunning) {
      localTimeLeft--;
      updateUI({...timerData, timeLeft: localTimeLeft, currentSection});
    }
  }, 1000);

  // Scale slider
  scaleSlider.addEventListener('input', () => {
    const scale = scaleSlider.value;
    timerEl.style.fontSize = `${20 * scale}vw`;
  });
</script>
</body>
</html>
